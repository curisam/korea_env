use_gpu: True
device: 0
early_stop:
  patience: 0
federate:
  mode: standalone
  sampler: anal_cluster
  client_num: 40
  sample_client_num: 4
  total_round_num: 250
  save_to: "checkpoints_1.0/tldr_choice_qwen_aggregation_analysis_u4.ckpt"
  ignore_weight: True
  save_freq: 25
  share_local_model: True
  online_aggr: False


data:
  root: data/
  type: 'reddit-tldr-comparison-choice@llm'
  splits: [0.9,0.09,0.01]
  splitter: 'meta'
llm:
  tok_len: 1024
  accelerator:
    use: True
  chat:
    max_len: 1024
  adapter:
    use: True
    count: 4
    cluster_runtime:
      schedule_file: 'exp/tldr/choice_qwen/gfl/fedbis_oracle_u4_1.0/cluster_schedule/cluster_schedule_u4.json'
    grouping:
      use: False
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 8, 'lora_alpha': 16, 'lora_dropout': 0.05, target_modules: [ "q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj" ] } ]
  grad_accum_step: 2
dataloader:
  batch_size: 2
model:
  type: 'Qwen/Qwen2-0.5B@huggingface_llm'
train:
  local_update_steps: 30
  batch_or_epoch: batch
  optimizer:
    # type: RMSprop
    # lr: 0.000001
    type: AdamW
    betas: (0.9, 0.95)
    lr: 0.00001
  scheduler:
    milestones: [100, 150]    # 100라운드, 150라운드에 감축
    gamma: 1.0            # ×1.0씩 곱해 감축
  is_enable_half: True
criterion:
  type: CrossEntropyLoss
trainer:
  type: llmrewardchoicetrainer
  choices: ['A', 'B']
eval:
  freq: 25
  split: ['val', 'test']
  metrics: ['loss', 'acc']
  best_res_update_round_wise_key: test_loss
  count_flops: False
outdir: exp/tldr/choice_qwen/gfl/aggregation_analysis_u4_1.0
expname: ""